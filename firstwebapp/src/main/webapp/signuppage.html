<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign up Page</title>
</head>
<body>

<h2>SignUp</h2>

    <form action="signup" method="post" >    <!-- connecting signup servlet, post is used in method -->
    
<div>
            <label>Name:</label>
            <input type="text" name="name" required>
        </div>

        <br>

        <div>
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>

      

        <br>

        <div>
            <input type="submit" value="OK">
        </div>

    </form>

</body>
</html>
